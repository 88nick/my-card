<!DOCTYPE html>
<html lang="ru">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визитка</title>

    <style>

      /* Сброс отступов и единая модель блоков */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* Базовые стили страницы */
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f4f3ef;
        color: #2c2c2c;
        line-height: 1.7;
        font-size: 18px;
      }

      /* Hero: тёмный фон на всю ширину, текст по центру */
      #hero {
        background-color: #3a2545;
        color: #f0ede8;
        text-align: center;
        padding: 5rem 1.25rem;
      }

      #hero h1 {
        font-size: clamp(3rem, 13vw, 6.5rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 0.5rem;
      }

      #hero p {
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #ffffff;
      }

      /* Секции и подвал: ограниченная ширина, центрированные */
      section, footer {
        max-width: 700px;
        margin: 0 auto;
        padding: 4.5rem 1.25rem;
      }

      /* Подвал чуть меньше и бледнее */
      footer {
        padding-top: 1.5rem;
        padding-bottom: 2rem;
        color: #999;
        font-size: 0.875rem;
        border-top: 1px solid #e0deda;
      }

      /* Заголовки секций с линией-акцентом снизу */
      h2 {
        font-size: 1.2rem;
        font-weight: 600;
        color: #2c2c2c;
        padding-bottom: 0.4rem;
        border-bottom: 2px solid #8a95a8;
        display: inline-block;
        margin-bottom: 1.25rem;
      }

      /* Текст абзацев */
      p {
        color: #3d3d3d;
      }

      /* Списки без стандартных маркеров */
      ul {
        list-style: none;
        padding: 0;
      }

      ul li {
        padding: 0.3rem 0;
        color: #3d3d3d;
      }

      /* Тире-маркер цвета акцента */
      ul li::before {
        content: '—';
        margin-right: 0.6rem;
        color: #8a95a8;
      }

      /* Ссылки */
      a {
        color: #4e6480;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }

      a:hover {
        color: #354d66;
        border-bottom-color: #354d66;
      }

      /* Мобильные: уменьшаем заголовок и отступы */
      @media (max-width: 480px) {
        #hero h1 {
          font-size: 2.25rem;
        }

        section, footer {
          padding: 3rem 1rem;
        }
      }

    </style>

  </head>

  <body>

    <!-- Шапка: обложка с именем и ролью -->
    <header id="hero">
      <h1>Николай</h1>
      <p>Руководитель</p>
    </header>

    <!-- Секция: обо мне -->
    <section id="about">
      <h2>Обо мне</h2>
      <p>
        Я руководитель в катализаторной компании.
        Сейчас осваиваю веб — этот сайт мой первый шаг в новом направлении.
      </p>
    </section>

    <!-- Секция: интересы -->
    <section id="skills">
      <h2>Интересы</h2>
      <ul>
        <li>Работа</li>
        <li>Кино</li>
        <li>Мотоциклы</li>
      </ul>
    </section>

    <!-- Секция: контакты -->
    <section id="contacts">
      <h2>Контакты</h2>
      <ul>
        <li>
          <a href="mailto:nikolaykarpov2011@gmail.com">nikolaykarpov2011@gmail.com</a>
        </li>
      </ul>
    </section>

    <!-- Подвал -->
    <footer>
      <p>© 2026 Николай</p>
    </footer>

  </body>

</html>
